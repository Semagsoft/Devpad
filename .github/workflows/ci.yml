name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CCACHE_DIR: /tmp/ccache

jobs:
  format:
    name: Check formatting
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get install -y -qq clang-format
      - name: Check C++ formatting
        run: |
          find src tests \( -name '*.cpp' -o -name '*.h' \) -print0 | xargs -0 clang-format --dry-run --Werror

  tidy:
    name: Clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake build-essential clang-tidy \
            qt6-base-dev qt6-multimedia-dev qt6-svg-dev \
            qt6-tools-dev \
            libgl-dev \
            libqscintilla2-qt6-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy on source
        run: |
          find src \( -name '*.cpp' -and -not -name '*kodoterm*' -and -not -name 'mainwindow.cpp' -and -not -name '*qtermwidget*' \) -print0 | \
            xargs -0 clang-tidy --extra-arg=-Wno-unknown-argument -p build

      - name: Run clang-tidy on tests
        run: |
          find tests \( -name '*.cpp' \) -print0 | \
            xargs -0 clang-tidy --extra-arg=-Wno-unknown-argument -p build

  build:
    name: Build and test (${{ matrix.compiler }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake build-essential clang \
            qt6-base-dev qt6-multimedia-dev qt6-svg-dev \
            qt6-tools-dev \
            libgl-dev \
            libqscintilla2-qt6-dev \
            ccache

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.compiler }}

      - name: Configure
        run: |
          export CCACHE_BASEDIR=${{ github.workspace }}
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler == 'gcc' && 'g++' || 'clang++' }} \
            -DCMAKE_CXX_FLAGS="-Werror" \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        env:
          LSAN_OPTIONS: suppressions=.lsan.supp
        run: ctest --test-dir build --output-on-failure
    name: Build AppImage
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake build-essential \
            qt6-base-dev qt6-multimedia-dev qt6-svg-dev \
            qt6-tools-dev \
            libgl-dev \
            libqscintilla2-qt6-dev \
            libfuse2

      - name: Configure
        run: cmake -S . -B build-appimage -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DBUILD_TESTS=OFF

      - name: Build
        run: cmake --build build-appimage -j$(nproc)

      - name: Package AppImage
        run: bash scripts/package-appimage.sh
        env:
          BUILD_DIR: build-appimage
          APPIMAGE_EXTRACT_AND_RUN: 1

      - uses: actions/upload-artifact@v4
        with:
          name: Devpad-AppImage-${{ github.ref_name }}
          path: Devpad-*.AppImage

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Devpad-*.AppImage
          fail_on_unmatched_files: false

  sanitize:
    name: Sanitizers (ASan+UBSan)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake build-essential \
            qt6-base-dev qt6-multimedia-dev qt6-svg-dev \
            qt6-tools-dev \
            libgl-dev \
            libqscintilla2-qt6-dev

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -Werror" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure
