name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CCACHE_DIR: /tmp/ccache

jobs:
  format:
    name: Check formatting
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get install -y -qq clang-format
      - name: Check C++ formatting
        run: |
          find src tests \( -name '*.cpp' -o -name '*.h' \) -print0 | xargs -0 clang-format --dry-run --Werror

  tidy:
    name: Clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake build-essential clang-tidy \
            qt6-base-dev qt6-multimedia-dev qt6-printsupport-dev \
            qttools6-dev \
            libgl-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy on source
        run: |
          find src \( -name '*.cpp' \) -print0 | \
            xargs -0 clang-tidy -p build

      - name: Run clang-tidy on tests
        run: |
          find tests \( -name '*.cpp' \) -print0 | \
            xargs -0 clang-tidy -p build

  build:
    name: Build and test (${{ matrix.compiler }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake build-essential clang \
            qt6-base-dev qt6-multimedia-dev qt6-printsupport-dev \
            qttools6-dev \
            libgl-dev \
            ccache

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.compiler }}

      - name: Configure
        run: |
          export CCACHE_BASEDIR=${{ github.workspace }}
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler == 'gcc' && 'g++' || 'clang++' }} \
            -DCMAKE_CXX_FLAGS="-Werror" \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitize:
    name: Sanitizers (ASan+UBSan)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake build-essential \
            qt6-base-dev qt6-multimedia-dev qt6-printsupport-dev \
            qttools6-dev \
            libgl-dev

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -Werror" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure
